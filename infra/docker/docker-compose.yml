name: civora

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: civora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civora}
      POSTGRES_USER: ${POSTGRES_USER:-civora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '5432:5432'
    volumes:
      - civora_pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - civora_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-civora} -d ${POSTGRES_DB:-civora}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: civora-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - civora_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: civora-gotenberg
    restart: unless-stopped
    ports:
      - '3002:3000'
    networks:
      - civora_net
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  civora_pgdata:
    name: civora_pgdata

networks:
  civora_net:
    name: civora_net
    driver: bridge
