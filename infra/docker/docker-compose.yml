name: civora

services:
  postgres:
    # Image custom : PostGIS 3.4 + pgvector (cf. infra/docker/postgres/Dockerfile)
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: civora-postgres:16-3.4-pgvector
    container_name: civora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civora}
      POSTGRES_USER: ${POSTGRES_USER:-civora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '5432:5432'
    volumes:
      - civora_pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - civora_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-civora} -d ${POSTGRES_DB:-civora}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: civora-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - civora_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: civora-gotenberg
    restart: unless-stopped
    ports:
      - '3002:3000'
    networks:
      - civora_net
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog — capture SMTP en dev (UI sur http://localhost:8025) ────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: civora-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # UI Web
    networks:
      - civora_net

  # ── MinIO — S3-compatible pour le dev local (remplace Cloudflare R2) ────────
  minio:
    image: minio/minio:latest
    container_name: civora-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'   # API S3
      - '9001:9001'   # Console Web
    volumes:
      - civora_minio_data:/data
    networks:
      - civora_net
    healthcheck:
      test: ['CMD-SHELL', 'mc ready local || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MinIO init — crée le bucket et applique la politique privée ─────────────
  minio-init:
    image: minio/mc:latest
    container_name: civora-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - civora_net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-civora-dev}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        mc anonymous set none local/$${MINIO_BUCKET};
        echo 'MinIO bucket $${MINIO_BUCKET} créé et sécurisé (privé).';
        exit 0;
      "
    restart: on-failure

volumes:
  civora_pgdata:
    name: civora_pgdata
  civora_minio_data:
    name: civora_minio_data

networks:
  civora_net:
    name: civora_net
    driver: bridge
