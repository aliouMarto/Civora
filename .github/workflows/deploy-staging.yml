name: Deploy to Staging

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest)'
        required: false
        default: latest

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/civora
  DEPLOY_DIR: /opt/civora

jobs:
  # ─── Run Prisma migrations (idempotent) ────────────────────────────────────
  migrate:
    name: Prisma migrate deploy
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ─── Deploy via SSH + docker compose ───────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: staging
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${{ inputs.image_tag || 'latest' }}" >> "$GITHUB_OUTPUT"

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: infra/docker/docker-compose.prod.yml
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 2

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}

            # Write .env for docker compose
            cat > .env <<EOF
            IMAGE_TAG=${{ steps.tag.outputs.tag }}
            REGISTRY=${{ env.REGISTRY }}
            IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET=${{ secrets.R2_BUCKET }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            WEB_ORIGINS=${{ secrets.WEB_ORIGINS }}
            NODE_ENV=production
            EOF

            # Pull latest images and restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images (keep 3 most recent per service)
            docker image prune -f --filter "until=24h"

  # ─── Smoke tests ───────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke tests
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy
    steps:
      - name: Wait for services to be ready
        run: sleep 30

      - name: API health check
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            -H "X-Correlation-Id: ci-smoke-${{ github.sha }}" \
            "${{ secrets.STAGING_API_URL }}/health"

      - name: Web health check
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            "${{ secrets.STAGING_WEB_URL }}"

      - name: AI health check
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            "${{ secrets.STAGING_AI_URL }}/health"

      - name: Report smoke test result
        if: failure()
        run: |
          echo "::error::Smoke tests failed on staging after deploy of ${{ steps.tag.outputs.tag || inputs.image_tag }}"
          exit 1
