name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: sha-<sha>)'
        required: false

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/civora

jobs:
  build-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            dockerfile: infra/docker/Dockerfile.api
            context: .
          - service: web
            dockerfile: infra/docker/Dockerfile.web
            context: .
          - service: ai
            dockerfile: infra/docker/Dockerfile.ai
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: meta
        run: |
          SHA="${GITHUB_SHA::8}"
          TAG="${{ inputs.tag || format('sha-{0}', env.SHA) }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:${TAG},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${TAG}" >> "$GITHUB_OUTPUT"
        env:
          SHA: ${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            BUILD_SHA=${{ github.sha }}

    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}

  # Trigger staging deployment after all images are built
  trigger-staging:
    name: Trigger staging deploy
    needs: build-push
    uses: ./.github/workflows/deploy-staging.yml
    with:
      image_tag: ${{ needs.build-push.outputs.sha_tag }}
    secrets: inherit
